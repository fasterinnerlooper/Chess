services:
  chesster-frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: ${DOCKER_TARGET:-runtime}
    ports:
      - "${FRONTEND_PORT:-8080}:${FRONTEND_INTERNAL_PORT:-80}"
    environment:
      - VITE_API_URL=${VITE_API_URL:-http://localhost:5000}
    depends_on:
      chesster-api:
        condition: service_started
    networks:
      - chesster-network
    restart: unless-stopped

  chesster-api:
    build:
      context: ./backend
      dockerfile: Chesster.Api/Dockerfile
      target: ${DOCKER_TARGET:-runtime}
    environment:
      - ASPNETCORE_ENVIRONMENT=${ASPNETCORE_ENVIRONMENT:-Production}
      - ConnectionStrings__DefaultConnection=Host=chesster-db;Database=chesster;Username=postgres;Password=postgres
      - Jwt__Key=${JWT_KEY:-DefaultSecretKey12345678901234567890}
      - Jwt__Issuer=Chesster
      - Jwt__Audience=Chesster
    ports:
      - "${API_PORT:-5000}:8080"
    depends_on:
      chesster-db:
        condition: service_healthy
    networks:
      - chesster-network
    restart: unless-stopped

  chesster-db:
    image: postgres:16-alpine
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=chesster
    volumes:
      - chesster-data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - chesster-network
    restart: unless-stopped

networks:
  chesster-network:
    driver: bridge

volumes:
  chesster-data:

# Development override - add volumes for hot reload
x-dev-volumes: &dev-volumes
  volumes:
    - ./frontend:/app
    - /app/node_modules

x-dev-volumes-api: &dev-volumes-api
  volumes:
    - ./backend/Chesster.Api:/src